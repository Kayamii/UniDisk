name: CI

# Validates pull requests. Pushes to dev/main and version tags are handled by
# publish.yml (which also tests, then publishes the image).
on:
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend (build, vet, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - name: Govulncheck (Go vulnerability scan)
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.25"
          work-dir: backend

  frontend:
    name: Frontend (type-check, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: unidisk:ci
