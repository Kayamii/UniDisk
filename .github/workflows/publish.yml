name: Publish

# Build, test, scan, then publish container images.
#
#   push to `dev`   → image tagged `:dev`     (amd64, fast)
#   push to `main`  → image tagged `:main`    (amd64)
#   tag   `vX.Y.Z`  → `:X.Y.Z`, `:X.Y`, `:latest`  (amd64 + arm64, stable)
#
# Images are always pushed to GitHub Container Registry (ghcr.io).
# To ALSO publish to Docker Hub, set in the repo's
# Settings → Secrets and variables → Actions:
#   - Variable  DOCKERHUB_USERNAME
#   - Secret    DOCKERHUB_TOKEN
on:
  push:
    branches: [main, dev]
    tags: ["v*"]

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum
      - name: Backend build, vet, test
        working-directory: backend
        run: |
          go build ./...
          go vet ./...
          go test ./...
      - name: Govulncheck (Go vulnerability scan)
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.25"
          work-dir: backend

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Frontend type-check & build
        working-directory: web
        run: |
          npm ci
          npm run build

  publish:
    name: Build, scan & push image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write # create GitHub Releases on version tags
      packages: write # push to ghcr.io
      security-events: write # upload Trivy results to the Security tab
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/kayamii/unidisk
            name=docker.io/${{ vars.DOCKERHUB_USERNAME }}/unidisk,enable=${{ vars.DOCKERHUB_USERNAME != '' }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # :latest always tracks the latest production image (main or a tag).
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          # dev builds stay fast (amd64); production (main + release tags) are
          # multi-arch so amd64 and arm64 users both get the latest image.
          platforms: ${{ github.ref == 'refs/heads/dev' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/kayamii/unidisk@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      # On a version tag, publish a GitHub Release marked as "latest", with
      # auto-generated notes and the image references.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
          body: |
            Container images for this release:
            - `ghcr.io/kayamii/unidisk:${{ github.ref_name }}`
            - `docker.io/kayamii/unidisk:${{ github.ref_name }}`

            See the [CHANGELOG](https://github.com/Kayamii/UniDisk/blob/main/CHANGELOG.md) for details.
